<nav class="navbar">
  <span class="navbar-brand">WF-IMS</span>

  <div class="navbar-right">
    {% if current_user.is_authenticated %}
      <div class="navbar-user">
        <span class="fw-medium">{{ current_user.full_name }}</span>
        <span class="text-muted">·</span>
        <span class="text-muted">{{ current_user.role.value | title }}</span>
      </div>
      <a href="{{ url_for('auth.logout') }}" class="btn btn-secondary btn-sm">Logout</a>
    {% endif %}
  </div>
</nav>
