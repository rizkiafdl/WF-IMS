{% extends 'base.html' %}
{% block title %}{% if customer %}Edit Customer{% else %}Tambah Customer{% endif %} — WF-IMS{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">{% if customer %}Edit Customer{% else %}Tambah Customer{% endif %}</h1>
  <a href="{{ url_for('master.customer_list') }}" class="btn btn-secondary">Kembali</a>
</div>

<div class="card">
  <form method="POST">
    <div class="grid-2">
      <div class="form-group">
        <label class="form-label" for="name">Nama Customer *</label>
        <input class="form-input" type="text" id="name" name="name"
               value="{{ customer.name if customer else '' }}" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="contact_name">Nama Kontak</label>
        <input class="form-input" type="text" id="contact_name" name="contact_name"
               value="{{ customer.contact_name if customer else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="phone">Telepon</label>
        <input class="form-input" type="text" id="phone" name="phone"
               value="{{ customer.phone if customer else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email"
               value="{{ customer.email if customer else '' }}">
      </div>
      <div class="form-group">
        <label class="form-label" for="payment_terms">Terms Pembayaran (hari)</label>
        <input class="form-input" type="number" id="payment_terms" name="payment_terms" min="0"
               value="{{ customer.payment_terms if customer else '' }}">
      </div>
      {% if customer %}
      <div class="form-group">
        <label class="form-label">Status</label>
        <label class="flex-center gap-2">
          <input type="checkbox" name="is_active" {% if customer.is_active %}checked{% endif %}>
          Aktif
        </label>
      </div>
      {% endif %}
    </div>
    <div class="form-group">
      <label class="form-label" for="address">Alamat</label>
      <textarea class="form-textarea" id="address" name="address" rows="3">{{ customer.address if customer else '' }}</textarea>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Simpan</button>
      <a href="{{ url_for('master.customer_list') }}" class="btn btn-secondary">Batal</a>
    </div>
  </form>
</div>
{% endblock %}
